<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operating Principles</title>
  <style>
    body { font-family: "Segoe UI", "Noto Sans JP", system-ui, sans-serif; margin: 0; background: #0b1220; color: #edf2fb; line-height: 1.75; padding: 28px 18px 48px; }
    .shell { max-width: 980px; margin: 0 auto; display: grid; gap: 18px; }
    .panel { background: #111a2b; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 22px; }
    a { color: #75d7c0; }
    h1, h2 { margin: 0 0 10px; }
    p, li { color: #c5d0e3; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <p><a href="index.html">← Foundations</a> / <a href="../index.html">Hub Top</a></p>
      <h1>運用原則</h1>
      <p>Claude や Codex に更新を任せる前提で、壊さず・戻せて・拡張しやすい状態を保つための原則です。</p>
    </div>
    <div class="panel">
      <h2>原則</h2>
      <ul>
        <li>壊れてよいのではなく、戻せる前提で更新する</li>
        <li>ルートの総合トップは常に保つ</li>
        <li>カテゴリ責務をまたぐ変更は記録する</li>
        <li>新規追加前にカテゴリを決める</li>
        <li>リンク切れと文字化けを最優先で直す</li>
      </ul>
    </div>
  </div>
</body>
</html>
