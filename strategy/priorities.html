<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priorities</title>
  <style>
    body { font-family: "Segoe UI", "Noto Sans JP", system-ui, sans-serif; margin: 0; background: #0b1220; color: #edf2fb; line-height: 1.75; padding: 28px 18px 48px; }
    .shell { max-width: 980px; margin: 0 auto; display: grid; gap: 18px; }
    .panel { background: #111a2b; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 22px; }
    a { color: #75d7c0; }
    h1, h2 { margin: 0 0 10px; }
    p, li { color: #c5d0e3; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <p><a href="index.html">← Strategy</a> / <a href="../index.html">Hub Top</a></p>
      <h1>Priorities</h1>
      <p>現時点での優先順位です。技術ハブは「知識量」より「事業への効き方」で並べます。</p>
    </div>
    <div class="panel">
      <h2>優先度 高</h2>
      <ul>
        <li>Claude に安全に更新させる運用基盤</li>
        <li>Creator System の仕様明確化</li>
        <li>Claw Stack の比較と使い分け</li>
        <li>Research の要約と判断材料化</li>
      </ul>
      <h2>優先度 中</h2>
      <ul>
        <li>Workbench の実務知識拡張</li>
        <li>外部公開向けの見やすさ向上</li>
        <li>技術記事の再編集と集約</li>
      </ul>
      <h2>優先度 低</h2>
      <ul>
        <li>デザインの全面刷新</li>
        <li>過度な機能追加</li>
      </ul>
    </div>
  </div>
</body>
</html>
